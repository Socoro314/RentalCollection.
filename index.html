<!DOCTYPE html>
<html>
<head>
    <title>Rental Dashboard Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="centerBox">
    <h2>Admin Login</h2>
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <h1>Rental Dashboard Pro</h1>

    <!-- DASH CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Collected</h3>
            <p>$<span id="totalCollected">0</span></p>
        </div>

        <div class="card">
            <h3>Total Expected</h3>
            <p>$<span id="totalExpected">0</span></p>
        </div>

        <div class="card">
            <h3>Balance</h3>
            <p>$<span id="balance">0</span></p>
        </div>
    </div>

    <hr>

    <!-- FORM -->
    <div class="form">
        <input id="tenant" placeholder="Tenant Name">
        <input id="property" placeholder="Property Name">
        <input id="unit" placeholder="Unit Number">
        <input id="rent" type="number" placeholder="Monthly Rent">
        <input id="amount" type="number" placeholder="Paid Amount">
        <button onclick="savePayment()">Save Payment</button>
    </div>

    <!-- SEARCH -->
    <input id="searchBox" placeholder="Search tenant..." onkeyup="searchTenant()">

    <!-- BUTTONS -->
    <button onclick="exportCSV()">Export CSV</button>

    <hr>

    <!-- LIST -->
    <h2>Payments</h2>
    <div id="paymentList"></div>

    <h2>Unpaid Rent</h2>
    <div id="unpaidList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
