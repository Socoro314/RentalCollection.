<!DOCTYPE html>
<html>
<head>
    <title>Rental Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Admin Login</h2>
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

    <h1>Rental Management System</h1>

    <!-- DASHBOARD -->
    <h2>Dashboard</h2>
    <div class="dashboard">
        <p>Total Collected: $<span id="totalCollected">0</span></p>
        <p>Total Expected: $<span id="totalExpected">0</span></p>
        <p>Balance: $<span id="balance">0</span></p>
    </div>

    <!-- FORM -->
    <div>
        <input id="tenant" placeholder="Tenant Name">
        <input id="property" placeholder="Property Name">
        <input id="unit" placeholder="Unit Number">
        <input id="rent" type="number" placeholder="Monthly Rent">
        <input id="amount" type="number" placeholder="Paid Amount">
        <button onclick="savePayment()">Save Payment</button>
    </div>

    <!-- ACTIONS -->
    <input id="searchBox" placeholder="Search tenant..." onkeyup="searchTenant()">

    <button onclick="exportCSV()">Export CSV</button>

    <hr>

    <h2>Payments</h2>
    <ul id="paymentList"></ul>

    <h2>Unpaid Rent</h2>
    <ul id="unpaidList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
